<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>

  <!-- network crown -->
  <g filter="url(#shadow)">
    <path d="M118 332 L182 188 L256 262 L330 188 L394 332"
          fill="none" stroke="url(#gold)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M128 332 H384" fill="none" stroke="url(#gold)" stroke-width="26" stroke-linecap="round"/>
    <path d="M182 188 L256 132 L330 188" fill="none" stroke="url(#gold)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <circle cx="118" cy="332" r="22" fill="url(#gold)"/>
    <circle cx="182" cy="188" r="22" fill="url(#gold)"/>
    <circle cx="256" cy="132" r="24" fill="url(#gold)"/>
    <circle cx="330" cy="188" r="22" fill="url(#gold)"/>
    <circle cx="394" cy="332" r="22" fill="url(#gold)"/>

    <circle cx="256" cy="262" r="19" fill="#0B1220" stroke="url(#gold)" stroke-width="16"/>
  </g>
</svg>
