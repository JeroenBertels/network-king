{% extends "base.html" %}

{% block content %}
  <section class="section-card scanner-shell" data-scanner>
    <h1 class="card-title">Scan a badge</h1>
    <div class="scanner-stage">
      <div class="scanner-reader" id="scanner-reader" data-scan-reader></div>
      <div class="scanner-frame"></div>
    </div>
    <p class="scanner-status" data-scanner-status>Tap “Start camera” to begin scanning. A successful scan opens the character automatically.</p>
    <div class="button-row">
      <button class="button" type="button" data-scan-start>Start camera</button>
      <button class="button button-secondary" type="button" data-scan-stop>Stop camera</button>
    </div>
    <form method="post" action="/events/{{ event.slug }}/scan" data-scan-form hidden>
      <input type="hidden" name="qr_value" data-scan-input>
    </form>
  </section>
{% endblock %}

{% block scripts %}
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" crossorigin="anonymous"></script>
  <script src="/static/scanner.js"></script>
{% endblock %}
