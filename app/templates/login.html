{% extends "base.html" %}

{% block content %}
  <section class="section-card narrow-card">
    <h1 class="card-title">Log in</h1>
    <form method="post" action="/login" class="stack">
      <label class="field">
        <span>Login</span>
        <input type="text" name="login" autocomplete="username" required>
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="button" type="submit">Enter the event</button>
    </form>
  </section>
{% endblock %}
