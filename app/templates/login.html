{% extends "base.html" %}

{% block content %}
  <section class="hero">
    <div class="hero-copy">
      <p class="eyebrow">Network King</p>
      <h1>Log back in to keep the trail moving.</h1>
      <p class="lede">Networkers can save character notes and unlock the next guest badge. Admins can manage events, accounts, characters, and downloads.</p>
    </div>
  </section>

  <section class="section-card narrow-card">
    <form method="post" action="/login" class="stack">
      <label class="field">
        <span>Login</span>
        <input type="text" name="login" autocomplete="username" required>
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="button" type="submit">Enter the event</button>
    </form>
  </section>
{% endblock %}
